<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var dark =
        saved === 'dark' ||
        (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>

</head>
